server:
  port: 8778

spring:
  application:
    name: diagnostic-service

  datasource:
    url: jdbc:mysql://localhost:3306/diagnostic_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false