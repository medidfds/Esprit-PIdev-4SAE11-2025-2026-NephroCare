# config-server/src/main/resources/configs/Api-Gateway.yml

server:
  port: 8070

spring:
  application:
    name: Api-Gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4369"
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: hospitalization-service
          uri: http://hospitalization-service:8076
          predicates:
            - Path=/hospitalization/**
          filters:
            - StripPrefix=1

        - id: diagnostic-service
          uri: http://diagnostic-service:8778
          predicates:
            - Path=/diagnostic/**
          filters:
            - StripPrefix=1

        - id: dialysis-service
          uri: http://dialysis-service:8075
          predicates:
            - Path=/dialysis/**
          filters:
            - StripPrefix=1

        - id: pharmacy-service
          uri: http://pharmacy-service:8087
          predicates:
            - Path=/pharmacy/**
          filters:
            - StripPrefix=1

        - id: clinical-service
          uri: http://clinical-service:8079
          predicates:
            - Path=/clinical/**
          filters:
            - StripPrefix=1

        # Notification endpoints live in dialysis-service but the UI calls /api/notifications/**
        - id: notifications
          uri: http://dialysis-service:8075
          predicates:
            - Path=/api/notifications/**

        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: http://order-service:8089
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://discovery-service:8761/eureka/}