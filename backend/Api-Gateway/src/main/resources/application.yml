server:
  port: 8070

spring:
  application:
    name: Api-Gateway
  cloud:
    gateway:
      default-filters:
        # Avoid CORS failure: multiple Access-Control-Allow-Origin values.
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4369"
              - "http://localhost:4201"
              - "http://localhost:30880"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: false
      routes:
        - id: clinical-service
          uri: http://clinical-service:8079
          predicates:
            - Path=/clinical/**
          filters:
            - StripPrefix=1
            - name: Cors
              args:
                allowedOrigins: "http://localhost:30880,http://localhost:4369,http://localhost:4201"
                allowedMethods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
                allowedHeaders: "*"
                allowCredentials: true

        - id: hospitalization-service
          uri: http://hospitalization-service:8076
          predicates:
            - Path=/hospitalization/**
          filters:
            - StripPrefix=1
            - name: Cors
              args:
                allowedOrigins: "http://localhost:30880,http://localhost:4369,http://localhost:4201"
                allowedMethods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
                allowedHeaders: "*"
                allowCredentials: true

        # UI calls /api/notifications/** (no service prefix)
        - id: notifications
          uri: http://dialysis-service:8075
          predicates:
            - Path=/api/notifications/**

        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: http://order-service:8089
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://discovery-service:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
