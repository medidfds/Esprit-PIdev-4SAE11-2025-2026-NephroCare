server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/readiness_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: nephrocare
    password: nephrocare_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


  rabbitmq:
    host: rabbitmq
    port: 5672
    username: nephrocare
    password: nephrocare_pass

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/nephro-realm

# Internal service-to-service call for fallback PatientAvailability creation
dialysis-service:
  base-url: http://dialysis-service:8080

simulation:
  force-active: false
  vehicle:
    interval: 5000
