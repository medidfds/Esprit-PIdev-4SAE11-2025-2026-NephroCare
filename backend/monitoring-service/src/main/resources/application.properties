spring.application.name=monitoring-service
server.port=8080

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.datasource.url=jdbc:mysql://mysql:3306/monitoring_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=nephrocare
spring.datasource.password=nephrocare_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
