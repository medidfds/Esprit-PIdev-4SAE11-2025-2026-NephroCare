services:
  mysql:
    image: mysql:8.4
    container_name: pidev-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: pidev-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./user-service/src/main/resources/import-realm.json:/opt/keycloak/data/import/import-realm.json:ro
    command: start-dev --import-realm

  discovery-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: discovery-service
    container_name: pidev-discovery
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: Api-Gateway
    container_name: pidev-api-gateway
    depends_on:
      - discovery-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    ports:
      - "8070:8070"

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: user-service
    container_name: pidev-user-service
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/nephro_users_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/nephro-realm
    ports:
      - "8069:8069"

  clinical-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: clinical
    container_name: pidev-clinical-service
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/clinical_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    ports:
      - "8079:8079"

  diagnostic-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: diagnostic-service
    container_name: pidev-diagnostic-service
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/diagnostic_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    ports:
      - "8778:8778"

  dialysis-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: dialysis-service
    container_name: pidev-dialysis-service
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dialysis_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    ports:
      - "8075:8075"

  hospitalization-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: Hospitalization-service
    container_name: pidev-hospitalization-service
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hospitalization_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    ports:
      - "8076:8076"

  pharmacy-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: pharmacy-service
    container_name: pidev-pharmacy-service
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pharmacy_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    ports:
      - "8087:8087"

volumes:
  mysql_data:
  keycloak_data:
