spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=DAY;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

keycloak.auth-server-url=http://localhost
keycloak.realm=test-realm
keycloak.resource=test-client
keycloak.credentials.secret=test-secret

dialysis.reports.backfill=false
