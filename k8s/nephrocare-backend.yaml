apiVersion: v1
kind: Namespace
metadata:
  name: nephrocare
---
apiVersion: v1
kind: Secret
metadata:
  name: nephrocare-secrets
  namespace: nephrocare
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root
  MYSQL_USER: nephro
  MYSQL_PASSWORD: nephro123
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nephrocare-common
  namespace: nephrocare
data:
  SPRING_PROFILES_ACTIVE: docker
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
  CONFIG_SERVER_URL: http://config-server:8888
  KEYCLOAK_URL: http://keycloak:8180
  KEYCLOAK_REALM_ISSUER: http://keycloak:8180/realms/nephro-realm
  # Prevent microservices from crashing if MySQL isn't ready yet.
  # (HikariCP will keep retrying instead of failing fast.)
  SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-sql
  namespace: nephrocare
data:
  01-create-databases.sql: |
    CREATE DATABASE IF NOT EXISTS nephro_users_db;
    CREATE DATABASE IF NOT EXISTS clinical_db;
    CREATE DATABASE IF NOT EXISTS hospitalization_db;
    CREATE DATABASE IF NOT EXISTS diagnostic_db;
    CREATE DATABASE IF NOT EXISTS dialysis_db;
    CREATE DATABASE IF NOT EXISTS pharmacy_db;
    CREATE DATABASE IF NOT EXISTS order_db;

    GRANT ALL PRIVILEGES ON nephro_users_db.* TO 'nephro'@'%';
    GRANT ALL PRIVILEGES ON clinical_db.* TO 'nephro'@'%';
    GRANT ALL PRIVILEGES ON hospitalization_db.* TO 'nephro'@'%';
    GRANT ALL PRIVILEGES ON diagnostic_db.* TO 'nephro'@'%';
    GRANT ALL PRIVILEGES ON dialysis_db.* TO 'nephro'@'%';
    GRANT ALL PRIVILEGES ON pharmacy_db.* TO 'nephro'@'%';
    GRANT ALL PRIVILEGES ON order_db.* TO 'nephro'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: nephrocare
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: nephrocare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nephrocare-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: nephrocare-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nephrocare-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              value: mysql
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-init
          configMap:
            name: mysql-init-sql
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: nephrocare
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: nephrocare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0
          args: ["start-dev", "--http-port=8180"]
          ports:
            - containerPort: 8180
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: nephrocare-secrets
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nephrocare-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: nephrocare
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8180
      targetPort: 8180
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-nodeport
  namespace: nephrocare
spec:
  type: NodePort
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8180
      targetPort: 8180
      nodePort: 30180
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: nephrocare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      containers:
        - name: discovery-service
          image: nephrocare/discovery-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          envFrom:
            - configMapRef:
                name: nephrocare-common
            - secretRef:
                name: nephrocare-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: nephrocare
spec:
  selector:
    app: discovery-service
  ports:
    - name: http
      port: 8761
      targetPort: 8761
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: nephrocare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: nephrocare/config-server:local
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: native
          envFrom:
            - configMapRef:
                name: nephrocare-common
            - secretRef:
                name: nephrocare-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: nephrocare
spec:
  selector:
    app: config-server
  ports:
    - name: http
      port: 8888
      targetPort: 8888
---
apiVersion: apps/v1
