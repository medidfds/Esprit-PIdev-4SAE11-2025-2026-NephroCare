  namespace: nephrocare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: nephrocare/api-gateway:local
          imagePullPolicy: Always
          ports:
            - containerPort: 8070
          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
          envFrom:
            - configMapRef:
                name: nephrocare-common
            - secretRef:
                name: nephrocare-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nephrocare
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8070
      targetPort: 8070
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-nodeport
  namespace: nephrocare
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8070
      targetPort: 8070
      nodePort: 30070
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: nephrocare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: nephrocare/user-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/nephro_users_db?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nephrocare-secrets
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nephrocare-secrets
                  key: MYSQL_PASSWORD
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: nephrocare-common
                  key: KEYCLOAK_REALM_ISSUER
          envFrom:
            - configMapRef:
                name: nephrocare-common
            - secretRef:
                name: nephrocare-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
