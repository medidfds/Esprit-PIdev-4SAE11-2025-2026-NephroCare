apiVersion: apps/v1
kind: Deployment
metadata:
  name: backoffice-ui
  namespace: nephrocare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backoffice-ui
  template:
    metadata:
      labels:
        app: backoffice-ui
    spec:
      containers:
        - name: backoffice-ui
          image: nephrocare/backoffice-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backoffice-ui
  namespace: nephrocare
spec:
  type: NodePort
  selector:
    app: backoffice-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30880
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontoffice-ui
  namespace: nephrocare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontoffice-ui
  template:
    metadata:
      labels:
        app: frontoffice-ui
    spec:
      containers:
        - name: frontoffice-ui
          image: nephrocare/frontoffice-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontoffice-ui
  namespace: nephrocare
spec:
  type: NodePort
  selector:
    app: frontoffice-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30881
