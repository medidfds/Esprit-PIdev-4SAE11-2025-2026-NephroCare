<div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] lg:p-6">
  <div class="flex items-center gap-4">
    <div class="h-16 w-16 overflow-hidden rounded-full border border-gray-200 dark:border-gray-700">
      <img [src]="user.avatar" alt="User avatar" class="h-full w-full object-cover" />
    </div>
    <div class="min-w-0">
      <h4 class="truncate text-lg font-semibold text-gray-900 dark:text-white">
        {{ user.firstName || 'User' }} {{ user.lastName || '' }}
      </h4>
      <p class="text-sm font-medium uppercase tracking-wide text-brand-600 dark:text-brand-400">
        {{ user.role }}
      </p>
      <p class="truncate text-sm text-gray-500 dark:text-gray-400">{{ user.email || 'No email available' }}</p>
    </div>
  </div>
</div>
