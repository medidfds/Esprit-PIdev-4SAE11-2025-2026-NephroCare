<div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] lg:p-6">
  <h4 class="mb-5 text-lg font-semibold text-gray-900 dark:text-white">Location Details</h4>
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    <div>
      <p class="text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400">Country</p>
      <p class="text-sm font-semibold text-gray-800 dark:text-white">{{ address.country }}</p>
    </div>
    <div>
      <p class="text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400">City / State</p>
      <p class="text-sm font-semibold text-gray-800 dark:text-white">{{ address.cityState }}</p>
    </div>
    <div>
      <p class="text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400">Postal Code</p>
      <p class="text-sm font-semibold text-gray-800 dark:text-white">{{ address.postalCode }}</p>
    </div>
    <div>
      <p class="text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400">Identifier</p>
      <p class="text-sm font-semibold text-gray-800 dark:text-white">{{ address.taxId }}</p>
    </div>
  </div>
</div>
