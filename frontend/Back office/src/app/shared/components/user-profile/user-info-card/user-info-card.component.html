<div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] lg:p-6">
  <h4 class="mb-5 text-lg font-semibold text-gray-900 dark:text-white">Personal Information</h4>
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    <div>
      <p class="text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400">First Name</p>
      <p class="text-sm font-semibold text-gray-800 dark:text-white">{{ user.firstName || 'N/A' }}</p>
    </div>
    <div>
      <p class="text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400">Last Name</p>
      <p class="text-sm font-semibold text-gray-800 dark:text-white">{{ user.lastName || 'N/A' }}</p>
    </div>
    <div>
      <p class="text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400">Email</p>
      <p class="text-sm font-semibold text-gray-800 dark:text-white">{{ user.email || 'N/A' }}</p>
    </div>
    <div>
      <p class="text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400">Role</p>
      <p class="text-sm font-semibold text-gray-800 dark:text-white">{{ user.bio || 'User' }}</p>
    </div>
  </div>
</div>
