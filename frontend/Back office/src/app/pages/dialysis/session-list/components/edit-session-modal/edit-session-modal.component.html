<app-modal [open]="open" title="Clinical Performance Report" width="lg" (closed)="closed.emit()">
    
    <div class="ed-form">
        <div class="flex items-center gap-3 p-4 bg-blue-50 border border-blue-100 rounded-xl mb-2">
            <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-blue-600 shadow-sm">
                <i class="bi bi-pencil-square"></i>
            </div>
            <div>
                <div class="text-[10px] font-bold text-blue-400 uppercase tracking-widest leading-none">Correction Mode</div>
                <div class="text-xs font-bold text-blue-900 mt-0.5">Editing session started on {{ session?.sessionDate | date:'medium' }}</div>
            </div>
        </div>

        <div>
            <label class="ed-label">Weight Before (kg)</label>
            <input type="number" class="ed-input" [(ngModel)]="weightBefore" placeholder="e.g. 70.5" step="0.1" required>
        </div>

        <div>
            <label class="ed-label">Adjusted Pre-session BP</label>
            <input type="text" class="ed-input" [(ngModel)]="preBloodPressure" placeholder="e.g. 120/80">
        </div>

        <div>
            <label class="ed-label">Correction Notes</label>
            <textarea class="ed-input min-h-[100px] resize-none" [(ngModel)]="complications" placeholder="Reason for update or original observations..."></textarea>
        </div>
    </div>

    <div class="ed-footer">
        <button class="ed-btn ed-btn--outline" (click)="closed.emit()">Discard</button>
        <button class="ed-btn ed-btn--primary" [disabled]="busy || !weightBefore" (click)="onSubmit()">
            <i class="bi" [class.bi-save-fill]="!busy" [class.bi-arrow-repeat]="busy" [class.animate-spin]="busy"></i>
            {{ busy ? 'Saving...' : 'Update Records' }}
        </button>
    </div>

</app-modal>
