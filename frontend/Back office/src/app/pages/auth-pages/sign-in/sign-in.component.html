<div class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900">
  <div class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-gray-800 dark:text-white mb-6">Sign In</h1>
    
    <form [formGroup]="signInForm" (ngSubmit)="onSubmit()">
      <!-- Email Input -->
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
          Email
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white"
          placeholder="Enter your email"
        />
        <div *ngIf="signInForm.get('email')?.invalid && signInForm.get('email')?.touched" class="text-red-500 text-sm mt-1">
          Please enter a valid email
        </div>
      </div>

      <!-- Password Input -->
      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
          Password
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white"
          placeholder="Enter your password"
        />
        <div *ngIf="signInForm.get('password')?.invalid && signInForm.get('password')?.touched" class="text-red-500 text-sm mt-1">
          Password must be at least 6 characters
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="!signInForm.valid"
        class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Sign In
      </button>
    </form>

    <!-- Sign Up Link -->
    <p class="text-center text-gray-600 dark:text-gray-400 mt-6">
      Don't have an account?
      <a (click)="navigateToSignUp()" class="text-blue-600 cursor-pointer hover:underline">Sign Up</a>
    </p>
  </div>
</div>
