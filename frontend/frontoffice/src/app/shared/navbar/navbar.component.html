<nav class="app-navbar sticky-top" [class.nav-scrolled]="scrolled">
  <div class="container">
    <div class="navbar navbar-expand-lg p-0">
      <a routerLink="/" class="navbar-brand app-brand">
        <i class="bi bi-heart-pulse-fill me-2"></i>
        NephroCare
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarCollapse">
        <div class="navbar-nav ms-auto">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item nav-link">Home</a>
          <a routerLink="/clinical" routerLinkActive="active" class="nav-item nav-link">Clinical</a>
          <a routerLink="/Pharmacy" routerLinkActive="active" class="nav-item nav-link">Pharmacy</a>
          <a routerLink="/Dialysis" routerLinkActive="active" class="nav-item nav-link">Dialysis</a>
          <a routerLink="/diagnostic" routerLinkActive="active" class="nav-item nav-link">Diagnostic</a>
          <a routerLink="/hospitalization" routerLinkActive="active" class="nav-item nav-link">Hospitalization</a>
        </div>

        <div class="d-flex align-items-center ms-lg-3 gap-2">
          <button type="button" class="btn btn-sm btn-outline-primary nav-btn" (click)="goToNotifications()">
            <i class="bi bi-bell me-1"></i>
            Alerts
            <span *ngIf="unreadCount > 0" class="badge bg-danger ms-1">{{ unreadCount }}</span>
          </button>

          <div class="user-menu-wrap">
            <button class="user-trigger" [class.open]="dropdownOpen" (click)="toggleDropdown()">
              <span class="user-initials">{{ getInitials() }}</span>
              <span class="user-name">{{ getFullName() }}</span>
              <i class="bi bi-chevron-down chevron-icon"></i>
            </button>

            <div class="user-dropdown" [class.show]="dropdownOpen">
              <button type="button" class="dd-item" (click)="goTo('/profile')">
                <i class="bi bi-person-circle dd-icon"></i>
                <span>Profile</span>
              </button>
              <button type="button" class="dd-item" (click)="goTo('/notifications')">
                <i class="bi bi-bell dd-icon"></i>
                <span>Notifications</span>
              </button>
              <button type="button" class="dd-item dd-logout" (click)="logout()">
                <i class="bi bi-box-arrow-right dd-icon"></i>
                <span>Logout</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
