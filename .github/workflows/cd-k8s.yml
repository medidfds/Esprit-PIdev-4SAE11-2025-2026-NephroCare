name: CD Kubernetes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "k8s/**"
      - ".github/workflows/cd-k8s.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/nephrocare

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: "discovery-service", docker_path: "discovery-service" }
          - { name: "config-server", docker_path: "config" }
          - { name: "api-gateway", docker_path: "Api-Gateway" }
          - { name: "user-service", docker_path: "user-service" }
          - { name: "clinical-service", docker_path: "clinical" }
          - { name: "diagnostic-service", docker_path: "diagnostic-service" }
          - { name: "dialysis-service", docker_path: "dialysis-service" }
          - { name: "hospitalization-service", docker_path: "Hospitalization-service" }
          - { name: "order-service", docker_path: "order-service/order-service" }
          - { name: "pharmacy-service", docker_path: "pharmacy-service" }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          build-args: |
            SERVICE_PATH=${{ matrix.service.docker_path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}:latest

  deploy-to-k8s:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "${HOME}/.kube/config"

      - name: Deploy backend manifest
        run: kubectl apply -f k8s/nephrocare-backend.yaml

      - name: Rollout images
        run: |
          kubectl -n nephrocare set image deploy/discovery-service discovery-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/discovery-service:${{ github.sha }}
          kubectl -n nephrocare set image deploy/config-server config-server=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/config-server:${{ github.sha }}
          kubectl -n nephrocare set image deploy/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/api-gateway:${{ github.sha }}
          kubectl -n nephrocare set image deploy/user-service user-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/user-service:${{ github.sha }}
          kubectl -n nephrocare set image deploy/clinical-service clinical-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/clinical-service:${{ github.sha }}
          kubectl -n nephrocare set image deploy/diagnostic-service diagnostic-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/diagnostic-service:${{ github.sha }}
          kubectl -n nephrocare set image deploy/dialysis-service dialysis-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/dialysis-service:${{ github.sha }}
          kubectl -n nephrocare set image deploy/hospitalization-service hospitalization-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/hospitalization-service:${{ github.sha }}
          kubectl -n nephrocare set image deploy/order-service order-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/order-service:${{ github.sha }}
          kubectl -n nephrocare set image deploy/pharmacy-service pharmacy-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/pharmacy-service:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl -n nephrocare rollout status deploy/discovery-service --timeout=300s
          kubectl -n nephrocare rollout status deploy/config-server --timeout=300s
          kubectl -n nephrocare rollout status deploy/api-gateway --timeout=300s
          kubectl -n nephrocare rollout status deploy/user-service --timeout=300s
          kubectl -n nephrocare rollout status deploy/clinical-service --timeout=300s
          kubectl -n nephrocare rollout status deploy/diagnostic-service --timeout=300s
          kubectl -n nephrocare rollout status deploy/dialysis-service --timeout=300s
          kubectl -n nephrocare rollout status deploy/hospitalization-service --timeout=300s
          kubectl -n nephrocare rollout status deploy/order-service --timeout=300s
          kubectl -n nephrocare rollout status deploy/pharmacy-service --timeout=300s
