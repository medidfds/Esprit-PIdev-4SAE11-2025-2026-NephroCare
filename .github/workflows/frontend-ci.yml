name: Frontend CI + Sonar

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: "frontoffice"
            path: "frontend/frontoffice"
            run_tests: false
          - name: "backoffice"
            path: "frontend/Back office"
            run_tests: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.app.path }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.app.path }}
        run: npm ci

      - name: Build Angular app
        working-directory: ${{ matrix.app.path }}
        run: npm run build

      - name: Run unit tests (backoffice)
        if: matrix.app.run_tests
        working-directory: ${{ matrix.app.path }}
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload coverage artifact (backoffice)
        if: matrix.app.run_tests
        uses: actions/upload-artifact@v4
        with:
          name: backoffice-coverage
          path: frontend/Back office/coverage
          if-no-files-found: warn

  sonar-frontend:
    name: Sonar Frontend Quality Gate
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=nephrocare-frontend
            -Dsonar.projectName=NephroCare Frontend
            -Dsonar.sources=frontend/frontoffice/src,frontend/Back office/src
            -Dsonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**,**/coverage/**
            -Dsonar.typescript.lcov.reportPaths=frontend/Back office/coverage/lcov.info

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
